name: Ecosystem CI

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  test-latest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Vue Latest
            override: 'vue@latest'
          - name: Nuxt Latest
            override: 'nuxt@latest'
          - name: Radix Vue Latest
            override: 'radix-vue@latest'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Override ${{ matrix.name }}
        run: pnpm add -w ${{ matrix.override }}
      - run: pnpm build
      - run: pnpm vitest run
